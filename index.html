<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ableismus in Gesundheit &amp; Suizidhilfe – Interaktive Mindmap</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171b28;
      --panel-2: #1f2535;
      --text: #e8edf8;
      --muted: #9da8bf;
      --line: #516184;
      --accent: #7ea3ff;
      --node-0: #364a7f;
      --node-1: #285c7a;
      --node-2: #2f6d55;
      --node-3: #4b5f2f;
      --shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Roboto, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100dvh;
      overflow: hidden;
    }

    .app { display: flex; height: 100dvh; }

    .sidebar {
      width: 340px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-right: 1px solid #2a3348;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 8;
    }
    .sidebar h1 { font-size: 1.05rem; margin: 0; }
    .sidebar .sub { color: var(--muted); margin: 0; font-size: 0.84rem; }

    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid #33415e; background: #121726; color: var(--text);
    }
    .suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #111827; border: 1px solid #36435f; border-radius: 10px;
      max-height: 220px; overflow: auto; display: none; z-index: 20;
    }
    .suggestions.open { display: block; }
    .suggestion {
      width: 100%; text-align: left; background: transparent; color: var(--text);
      border: 0; padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid #212a3f;
    }
    .suggestion:last-child { border-bottom: 0; }
    .suggestion:hover { background: #1c2640; }
    .suggestion small { color: var(--muted); display: block; margin-top: 3px; }

    .panel {
      background: #101626; border: 1px solid #2b3650; border-radius: 12px;
      padding: 12px;
    }
    #node-title { margin: 0 0 8px; font-size: 1.02rem; }
    #node-desc { margin: 0; color: #d8e1f2; line-height: 1.45; font-size: 0.92rem; }
    #node-links { margin: 10px 0 0; padding-left: 18px; }
    #node-links a { color: #91c2ff; }

    .canvas-wrap { flex: 1; position: relative; overflow: hidden; touch-action: none; }
    #viewport { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
    #edges { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
    #nodes-layer { position: absolute; left: 0; top: 0; }

    .node {
      position: absolute; min-width: 165px; max-width: 225px;
      padding: 10px 12px; border-radius: 12px; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12); cursor: pointer;
      user-select: none; transition: transform .15s ease, filter .15s ease;
    }
    .node:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .node.level-0 { background: var(--node-0); }
    .node.level-1 { background: var(--node-1); }
    .node.level-2 { background: var(--node-2); }
    .node.level-3, .node.level-4 { background: var(--node-3); }
    .node.selected { outline: 3px solid var(--accent); }
    .node-label { font-size: 0.92rem; font-weight: 600; line-height: 1.25; white-space: pre-line; }
    .node-meta { margin-top: 6px; font-size: 0.74rem; color: #d5def0; opacity: .88; }

    .fab-wrap { display: none; position: absolute; right: 12px; bottom: 14px; z-index: 14; gap: 8px; flex-direction: column; }
    .fab {
      width: 46px; height: 46px; border-radius: 50%; border: 1px solid #405078;
      background: #1a2238; color: var(--text); box-shadow: var(--shadow); cursor: pointer;
    }

    @media (max-width: 980px) {
      .app { display: block; }
      .sidebar {
        position: fixed; left: 0; right: 0; bottom: 0; width: 100%; height: 46dvh;
        border-right: none; border-top: 1px solid #314264;
        border-radius: 16px 16px 0 0; transform: translateY(calc(100% - 48px));
        transition: transform .25s ease; z-index: 15;
      }
      .sidebar.open { transform: translateY(0); }
      .grabber {
        width: 52px; height: 5px; border-radius: 99px; background: #6b7998;
        opacity: .7; margin: 2px auto 8px;
      }
      .canvas-wrap { height: 100dvh; }
      .fab-wrap { display: flex; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="grabber" aria-hidden="true"></div>
      <h1>Ableismus in Gesundheit &amp; Suizidhilfe</h1>
      <p class="sub">Klicke einen Knoten oder suche nach Begriffen.</p>

      <div class="search-wrap">
        <input id="search" class="search-input" type="search" placeholder="Suche (Titel/Beschreibung)" aria-label="Mindmap durchsuchen" autocomplete="off" />
        <div id="suggestions" class="suggestions" role="listbox" aria-label="Suchvorschläge"></div>
      </div>

      <section class="panel" id="info-panel">
        <h2 id="node-title">Kein Knoten ausgewählt</h2>
        <p id="node-desc">Klicke auf einen Knoten, um Details zu sehen.</p>
        <ul id="node-links"></ul>
      </section>
    </aside>

    <main class="canvas-wrap" id="canvas">
      <div id="viewport">
        <svg id="edges"></svg>
        <div id="nodes-layer"></div>
      </div>

      <div class="fab-wrap">
        <button class="fab" id="fab-center" aria-label="Mindmap zentrieren">⌖</button>
        <button class="fab" id="fab-expand" aria-label="Alle Knoten aufklappen">＋</button>
        <button class="fab" id="fab-collapse" aria-label="Alle Knoten zuklappen">－</button>
        <button class="fab" id="fab-info" aria-label="Info-Panel öffnen oder schließen">ℹ</button>
      </div>
    </main>
  </div>

  <script>
    const mindmapData = {
      id: "root",
      label: "Ableismus in Gesundheit & Suizidhilfe",
      desc: "Zentrale Übersicht über die Auswirkungen von Ableismus in Versorgung, Recht, Ethik und gesellschaftlicher Teilhabe.",
      links: [],
      children: [
        {
          id: "grundlagen",
          label: "Konzeptionelle Grundlagen",
          desc: "Definitionen, Modelle von Behinderung und historische Einordnung von Ableismus im Gesundheitskontext.",
          links: [{ label: "WHO Report", url: "https://www.who.int/teams/noncommunicable-diseases/sensory-functions-disability-and-rehabilitation/world-report-on-disability" }],
          children: [
            { id: "definition", label: "Definition von Ableismus", desc: "Ableismus ist die systematische Bevorzugung bestimmter körperlicher/geistiger Fähigkeiten und die Abwertung behinderter Menschen.", links: [], children: [] },
            { id: "modelle", label: "Medizinisches vs. soziales Modell", desc: "Das medizinische Modell fokussiert Defizite; das soziale Modell betont Barrieren und Exklusion.", links: [], children: [] }
          ]
        },
        {
          id: "versorgung",
          label: "Barrieren in der Gesundheitsversorgung",
          desc: "Kommunikative, bauliche und institutionelle Hindernisse, die Zugang und Qualität von Behandlung beeinträchtigen.",
          links: [{ label: "CDC – Disability and Health", url: "https://www.cdc.gov/ncbddd/disabilityandhealth/index.html" }],
          children: [
            { id: "zugang", label: "Physischer Zugang", desc: "Nicht-barrierefreie Praxen, Geräte, Transport und Terminstrukturen.", links: [], children: [] },
            { id: "kommunikation", label: "Kommunikationsbarrieren", desc: "Fehlende Leichte Sprache, Gebärdensprachdolmetschung und assistive Kommunikation.", links: [], children: [] },
            { id: "bias", label: "Diagnostischer Bias", desc: "Symptome werden fälschlich Behinderung zugeschrieben (diagnostic overshadowing).", links: [], children: [] }
          ]
        },
        {
          id: "suizidhilfe",
          label: "Ableismus & Suizidhilfe",
          desc: "Fragen von Selbstbestimmung, strukturellem Druck und gesellschaftlicher Bewertung von Lebensqualität.",
          links: [{ label: "UN CRPD", url: "https://www.un.org/development/desa/disabilities/convention-on-the-rights-of-persons-with-disabilities.html" }],
          children: [
            { id: "autonomie", label: "Autonomie und informierte Entscheidung", desc: "Entscheidungen müssen frei von Druck, Armut, Isolation und fehlender Unterstützung sein.", links: [], children: [] },
            { id: "risiken", label: "Risiken strukturellen Drucks", desc: "Wenn Hilfesysteme fehlen, kann der Wunsch zu sterben Ausdruck von Vernachlässigung sein.", links: [], children: [] },
            { id: "schutz", label: "Schutzmechanismen", desc: "Barrierefreie Beratung, Peer-Support und unabhängige Rechtsberatung als Mindeststandard.", links: [], children: [] }
          ]
        },
        {
          id: "loesungen",
          label: "Politik, Ethik & Lösungen",
          desc: "Maßnahmen gegen Ableismus: Partizipation, Antidiskriminierung, Ausbildung und inklusive Forschung.",
          links: [],
          children: [
            { id: "partizipation", label: "Partizipation behinderter Menschen", desc: "Nichts über uns ohne uns: Betroffene müssen Leitlinien und Entscheidungen mitgestalten.", links: [], children: [] },
            { id: "bildung", label: "Aus-/Fortbildung", desc: "Verpflichtende Ausbildung zu Ableismus, Kommunikation und Disability Studies in Gesundheitsberufen.", links: [], children: [] },
            { id: "daten", label: "Daten & Forschung", desc: "Disaggregierte Daten und partizipative Forschung zur Messung struktureller Ungleichheit.", links: [], children: [] }
          ]
        }
      ]
    };

    const NODE_W = 190, NODE_H = 72, H_GAP = 150, V_GAP = 24;
    const state = {
      collapsed: new Set(), selectedId: null,
      tx: 20, ty: 20, scale: 1,
      minScale: 0.2, maxScale: 2.5,
      nodeMap: new Map(), parentMap: new Map(),
      layoutMap: new Map(),
      pointers: new Map(),
      pinchStartDist: 0, pinchStartScale: 1
    };

    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    const edgesSvg = document.getElementById('edges');
    const nodesLayer = document.getElementById('nodes-layer');
    const sidebar = document.getElementById('sidebar');
    const searchEl = document.getElementById('search');
    const suggestionsEl = document.getElementById('suggestions');

    function normalizeLabel(text) { return (text || '').replace(/\n/g, ' '); }

    function indexTree(node, parent = null, depth = 0) {
      state.nodeMap.set(node.id, { ...node, depth });
      if (parent) state.parentMap.set(node.id, parent.id);
      (node.children || []).forEach(child => indexTree(child, node, depth + 1));
    }
    indexTree(mindmapData);

    // Initial: nur Root + erste Ebene sichtbar.
    for (const [id, n] of state.nodeMap) {
      if (n.children?.length && n.depth >= 1) state.collapsed.add(id);
    }

    function isVisible(id) {
      let cur = id;
      while (state.parentMap.has(cur)) {
        const p = state.parentMap.get(cur);
        if (state.collapsed.has(p)) return false;
        cur = p;
      }
      return true;
    }

    function subtreeHeight(node) {
      const children = node.children || [];
      if (!children.length || state.collapsed.has(node.id)) return NODE_H;
      const sum = children.reduce((acc, ch) => acc + subtreeHeight(ch), 0);
      return Math.max(NODE_H, sum + V_GAP * (children.length - 1));
    }

    function place(node, depth, top) {
      const h = subtreeHeight(node);
      const y = top + (h - NODE_H) / 2;
      const x = depth * (NODE_W + H_GAP);
      state.layoutMap.set(node.id, { x, y, depth });
      const children = node.children || [];
      if (!children.length || state.collapsed.has(node.id)) return;
      let cursor = top;
      children.forEach(ch => {
        const chH = subtreeHeight(ch);
        place(ch, depth + 1, cursor);
        cursor += chH + V_GAP;
      });
    }

    function bezierPath(x1, y1, x2, y2) {
      const c = Math.max(40, (x2 - x1) * 0.45);
      return `M ${x1} ${y1} C ${x1 + c} ${y1}, ${x2 - c} ${y2}, ${x2} ${y2}`;
    }

    function setPanel(node) {
      const title = document.getElementById('node-title');
      const desc = document.getElementById('node-desc');
      const links = document.getElementById('node-links');
      if (!node) {
        title.textContent = 'Kein Knoten ausgewählt';
        desc.textContent = 'Klicke auf einen Knoten, um Details zu sehen.';
        links.innerHTML = '';
        return;
      }
      title.textContent = normalizeLabel(node.label);
      desc.textContent = node.desc || 'Keine Beschreibung.';
      links.innerHTML = '';
      (node.links || []).forEach(l => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${l.url}" target="_blank" rel="noopener noreferrer">${l.label}</a>`;
        links.appendChild(li);
      });
      if (window.matchMedia('(max-width: 980px)').matches) sidebar.classList.add('open');
    }

    function render() {
      state.layoutMap.clear();
      const totalH = subtreeHeight(mindmapData);
      place(mindmapData, 0, 0);

      nodesLayer.innerHTML = '';
      edgesSvg.innerHTML = '';
      let maxX = 0, maxY = 0;

      for (const [id, pos] of state.layoutMap) {
        if (!isVisible(id)) continue;
        const node = state.nodeMap.get(id);
        const d = document.createElement('div');
        d.className = `node level-${Math.min(pos.depth, 4)}${state.selectedId === id ? ' selected' : ''}`;
        d.style.left = `${pos.x}px`;
        d.style.top = `${pos.y}px`;
        d.setAttribute('data-id', id);
        d.innerHTML = `<div class="node-label">${node.label}</div><div class="node-meta">${node.children?.length ? (state.collapsed.has(id) ? '▶ Aufklappen' : '▼ Zuklappen') : '• Detail'}</div>`;
        d.addEventListener('click', (e) => {
          e.stopPropagation();
          state.selectedId = id;
          if (node.children?.length) {
            if (state.collapsed.has(id)) state.collapsed.delete(id); else state.collapsed.add(id);
          }
          setPanel(node);
          render();
        });
        nodesLayer.appendChild(d);
        maxX = Math.max(maxX, pos.x + NODE_W);
        maxY = Math.max(maxY, pos.y + NODE_H);
      }

      for (const [childId, parentId] of state.parentMap) {
        if (!isVisible(childId) || !isVisible(parentId)) continue;
        const p = state.layoutMap.get(parentId), c = state.layoutMap.get(childId);
        if (!p || !c) continue;
        const x1 = p.x + NODE_W, y1 = p.y + NODE_H / 2;
        const x2 = c.x, y2 = c.y + NODE_H / 2;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', bezierPath(x1, y1, x2, y2));
        path.setAttribute('stroke', 'var(--line)');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        edgesSvg.appendChild(path);
      }

      edgesSvg.setAttribute('width', maxX + 80);
      edgesSvg.setAttribute('height', maxY + 80);
      nodesLayer.style.width = `${maxX + 80}px`;
      nodesLayer.style.height = `${maxY + 80}px`;
      viewport.style.width = `${maxX + 80}px`;
      viewport.style.height = `${maxY + 80}px`;
      applyTransform();
    }

    function applyTransform() {
      viewport.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.scale})`;
    }

    function getVisibleBounds() {
      const ids = [...state.layoutMap.keys()].filter(isVisible);
      if (!ids.length) return { x: 0, y: 0, w: NODE_W, h: NODE_H };
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      ids.forEach(id => {
        const p = state.layoutMap.get(id);
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x + NODE_W);
        maxY = Math.max(maxY, p.y + NODE_H);
      });
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    function fitToView(padding = 40) {
      const b = getVisibleBounds();
      const cw = canvas.clientWidth, ch = canvas.clientHeight;
      const s = Math.max(state.minScale, Math.min(state.maxScale, Math.min((cw - padding * 2) / b.w, (ch - padding * 2) / b.h)));
      state.scale = s;
      state.tx = cw / 2 - (b.x + b.w / 2) * s;
      state.ty = ch / 2 - (b.y + b.h / 2) * s;
      applyTransform();
    }

    function centerOnNode(id, zoom = 1.35) {
      const p = state.layoutMap.get(id);
      if (!p) return;
      state.scale = Math.max(state.minScale, Math.min(state.maxScale, zoom));
      state.tx = canvas.clientWidth / 2 - (p.x + NODE_W / 2) * state.scale;
      state.ty = canvas.clientHeight / 2 - (p.y + NODE_H / 2) * state.scale;
      applyTransform();
    }

    function expandAncestors(id) {
      let cur = id;
      while (state.parentMap.has(cur)) {
        const p = state.parentMap.get(cur);
        state.collapsed.delete(p);
        cur = p;
      }
    }

    // Mouse Pan + Wheel Zoom
    let dragging = false, lastX = 0, lastY = 0;
    canvas.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node')) return;
      dragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      state.tx += e.clientX - lastX;
      state.ty += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      applyTransform();
    });
    window.addEventListener('mouseup', () => dragging = false);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const old = state.scale;
      const factor = e.deltaY < 0 ? 1.1 : 0.92;
      state.scale = Math.max(state.minScale, Math.min(state.maxScale, old * factor));
      const wx = (mx - state.tx) / old, wy = (my - state.ty) / old;
      state.tx = mx - wx * state.scale;
      state.ty = my - wy * state.scale;
      applyTransform();
    }, { passive: false });

    // Touch: pan (1 finger) + pinch zoom (2 finger)
    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!state.pointers.has(e.pointerId)) return;
      state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      const pts = [...state.pointers.values()];
      if (pts.length === 1) {
        const prev = pts[0];
        if (e.pressure === 0) return;
        state.tx += e.movementX;
        state.ty += e.movementY;
        applyTransform();
      } else if (pts.length === 2) {
        const [a, b] = pts;
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        const centerX = (a.x + b.x) / 2 - canvas.getBoundingClientRect().left;
        const centerY = (a.y + b.y) / 2 - canvas.getBoundingClientRect().top;
        if (!state.pinchStartDist) {
          state.pinchStartDist = dist;
          state.pinchStartScale = state.scale;
          return;
        }
        const old = state.scale;
        state.scale = Math.max(state.minScale, Math.min(state.maxScale, state.pinchStartScale * (dist / state.pinchStartDist)));
        const wx = (centerX - state.tx) / old, wy = (centerY - state.ty) / old;
        state.tx = centerX - wx * state.scale;
        state.ty = centerY - wy * state.scale;
        applyTransform();
      }
    });
    function endPointer(e) {
      state.pointers.delete(e.pointerId);
      if (state.pointers.size < 2) state.pinchStartDist = 0;
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);

    // Search + autocomplete
    const flatNodes = [...state.nodeMap.values()];
    function searchNodes(query) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return flatNodes.filter(n => `${normalizeLabel(n.label)} ${n.desc || ''}`.toLowerCase().includes(q)).slice(0, 8);
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = '';
      if (!items.length) {
        suggestionsEl.classList.remove('open');
        return;
      }
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'suggestion';
        btn.type = 'button';
        btn.innerHTML = `<strong>${normalizeLabel(item.label)}</strong><small>${(item.desc || '').slice(0, 80)}...</small>`;
        btn.addEventListener('click', () => {
          expandAncestors(item.id);
          state.selectedId = item.id;
          render();
          centerOnNode(item.id, 1.45);
          setPanel(item);
          suggestionsEl.classList.remove('open');
          searchEl.value = normalizeLabel(item.label);
          render();
        });
        suggestionsEl.appendChild(btn);
      });
      suggestionsEl.classList.add('open');
    }

    searchEl.addEventListener('input', () => renderSuggestions(searchNodes(searchEl.value)));
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) suggestionsEl.classList.remove('open');
    });

    // Mobile / desktop controls
    document.getElementById('fab-center').addEventListener('click', () => fitToView());
    document.getElementById('fab-expand').addEventListener('click', () => { state.collapsed.clear(); render(); fitToView(); });
    document.getElementById('fab-collapse').addEventListener('click', () => {
      state.collapsed.clear();
      for (const [id, n] of state.nodeMap) if (n.children?.length && n.depth >= 1) state.collapsed.add(id);
      render(); fitToView();
    });
    document.getElementById('fab-info').addEventListener('click', () => sidebar.classList.toggle('open'));

    canvas.addEventListener('click', (e) => {
      if (!e.target.closest('.node')) state.selectedId = null, setPanel(null), render();
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { render(); fitToView(); }, 90);
    });

    render();
    fitToView();
  </script>
</body>
</html>
